schema_version: 0.1
catalog_id: nomads_farm_plant_assets
purpose: NMS-style plant inventory catalog for metrics, dashboards and crop/device-like asset tracking.
updated: 2026-06-19

asset_model:
  analogy:
    network_device: plant_asset
    vendor: seed_or_plant_source
    model: cultivar_or_variety
    pid: plant_asset_id
    serial_number: individual_plant_id
    software_version: growth_stage_or_phenology_state
    site: project_or_growing_location
    rack_or_slot: container_id
    interface: measured_metric_stream
    telemetry: plant_growth_and_environment_timeseries
  required_fields:
    - asset_id
    - common_name
    - family
    - genus
    - species
    - cultivar_or_variety
    - life_cycle
    - growth_habit
    - edible_parts
    - primary_roles
    - current_project_ids
    - metric_profile

plant_assets:
  - asset_id: solanum_lycopersicum_pink_dream
    common_name: Pink Dream tomato
    bulgarian_name: Розова мечта домат
    asset_type: crop_plant
    family: Solanaceae
    genus: Solanum
    species: Solanum lycopersicum
    subspecies: null
    cultivar_or_variety: Pink Dream
    strain_or_population: balcony_2026_two_main_plants
    vendor_or_source: purchased_or_started_seedling
    model_role: large_fruiting_tomato
    life_cycle: tender_perennial_grown_as_annual
    growth_habit: indeterminate_or_semi_indeterminate_unknown
    edible_parts:
      - fruit
    useful_parts:
      - fruit
      - side_shoots_for_propagation
      - biomass_after_season
    primary_roles:
      - food_production
      - propagation_trial_source
      - balcony_container_performance_reference
    current_project_ids:
      - balcony-pot-house
    active_instances:
      - tomato_pink_dream_01
      - tomato_pink_dream_02
    containers:
      - f30_01
      - f30_02
    metric_profile:
      identity_metrics:
        - plant_id
        - cultivar
        - container_id
      growth_metrics:
        - height_cm
        - stem_diameter_mm
        - leaf_count
        - leaf_density_score_0_5
      phenology_metrics:
        - flower_count
        - fruit_count
        - fruit_stage
      stress_metrics:
        - wilting_score_0_5
        - yellowing_score_0_5
        - pest_pressure_score_0_5
      production_metrics:
        - harvest_weight_g
        - fruit_count_harvested
      propagation_metrics:
        - side_shoot_count
        - cutting_length_cm
        - rooting_success
    dashboard_views:
      - growth_time_series
      - plant_health_scorecard
      - fruiting_timeline
      - pruning_and_propagation_events
