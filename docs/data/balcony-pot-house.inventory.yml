future_measurement_schema:
  environment_timeseries:
    - timestamp
    - sensor_id
    - location_id
    - temperature_c
    - relative_humidity_percent
    - light_lux
    - soil_moisture_percent
    - substrate_temperature_c
  plant_growth_timeseries:
    - timestamp
    - plant_id
    - container_id
    - height_cm
    - vine_length_cm
    - stem_diameter_mm
    - leaf_count
    - flowering_status
    - fruit_count
    - harvest_weight_g
  container_observation_timeseries:
    - timestamp
    - container_id
    - watering_l
    - drainage_observed
    - wilting_score_0_5
    - pest_pressure_score_0_5
    - notes
