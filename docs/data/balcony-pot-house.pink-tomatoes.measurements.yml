schema_version: 0.2
dataset_id: balcony_pot_house_pink_tomatoes_measurements
project_id: balcony-pot-house
crop_group: pink_tomatoes
cultivar: Pink Dream
species: Solanum lycopersicum
created_from: chat_observations
updated: 2026-06-19

metadata:
  purpose: Seed the metrics logic with Pink Dream tomato observations from the first usable baseline day.
  data_quality_note: Day 1 is the first available project observation baseline, not germination day. Some values are approximate because they came from field notes written during work, not from a standardized measurement form.
  timezone: Europe/Sofia
  baseline_definition: day_1_equals_first_available_balcony_observation_baseline
  default_units:
    height: cm
    length: cm
    temperature: C
    stem_diameter: mm
    leaf_mass_removed: percent
  observer: rp

plants:
  - plant_id: tomato_pink_dream_01
    common_name: tomato
    cultivar: Pink Dream
    species: Solanum lycopersicum
    container_id: f30_01
    container_label: F30 #1
    role: fruit_production
    status: active
    data_quality: observed

  - plant_id: tomato_pink_dream_02
    common_name: tomato
    cultivar: Pink Dream
    species: Solanum lycopersicum
    container_id: f30_02
    container_label: F30 #2
    role: fruit_production
    status: active
    data_quality: observed

observation_days:
  - day_index: 1
    date: 2026-06-12
    label: first_available_baseline
    source: conversation_observation
    confidence: approximate
    notes: First available structured baseline for the two Pink Dream tomatoes on the balcony.
  - day_index: 6
    date: 2026-06-17
    label: pruning_and_propagation_day
    source: work_observation
    confidence: mixed
    notes: Pruning, tying and side-shoot propagation event.
  - day_index: 8
    date: 2026-06-19
    label: dataset_creation_day
    source: data_model_creation
    confidence: exact_for_data_creation_only
    notes: No new physical plant measurement recorded yet; created dataset and open-measurement list.

measurement_events:
