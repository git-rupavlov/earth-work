    day_index: 1
    timestamp: 2026-06-12T12:00:00+03:00
    project_id: balcony-pot-house
    event_type: baseline_observation
    weather_context:
      source: not_recorded
      sky: unknown
      temperature_c: null
    plants:
      - plant_id: tomato_pink_dream_01
        container_id: f30_01
        observations:
          estimated_height_cm: 50
          height_confidence: approximate
          growth_stage: vegetative
          support:
            tied_to_stake: unknown
            stake_diameter_mm: null
          visible_stress_score_0_5: null
          flowering_status: not_recorded
          fruit_count: null
      - plant_id: tomato_pink_dream_02
        container_id: f30_02
        observations:
          estimated_height_cm: 50
          height_confidence: approximate
          growth_stage: vegetative
          support:
            tied_to_stake: unknown
            stake_diameter_mm: null
          visible_stress_score_0_5: null
          flowering_status: not_recorded
          fruit_count: null

  - event_id: pink_tomato_pruning_2026_06_17_morning
    day_index: 6
    timestamp: 2026-06-17T07:00:00+03:00
    project_id: balcony-pot-house
    event_type: pruning_and_propagation
    weather_context:
      sky: cloudy
      temperature_c: 19
      temperature_source: manual_observation
    plants:
      - plant_id: tomato_pink_dream_01
        container_id: f30_01
        observations:
          height_cm_after_tying: 65
          height_confidence: approximate
          support:
            tied_to_stake: true
            stake_diameter_mm: 8
          leaf_mass_removed_percent:
            min: 15
            max: 20
            midpoint: 17.5
            confidence: approximate
          side_shoot_removed: true
          side_shoot_length_cm: 10
          side_shoot_length_confidence: approximate
          side_shoot_destination: direct_soil_trial
          stress_notes: null
      - plant_id: tomato_pink_dream_02
        container_id: f30_02
        observations:
          height_cm_after_tying: null
          height_confidence: not_recorded
          support:
            tied_to_stake: unknown
            stake_diameter_mm: null
          leaf_mass_removed_percent:
            min: 15
            max: 20
            midpoint: 17.5
            confidence: approximate
          side_shoot_removed: true
          side_shoot_length_cm: 10
          side_shoot_length_confidence: approximate
          side_shoot_destination: water_rooting_trial
          stress_notes: null

  - event_id: pink_tomato_side_shoot_direct_soil_2026_06_17
    day_index: 6
    timestamp: 2026-06-17T07:05:00+03:00
    project_id: balcony-pot-house
    event_type: propagation_start
    parent_plant_id: tomato_pink_dream_01
    propagated_plant_id: tomato_side_shoot_01
    container_id: f30_04
    method: direct_soil_planting
    material:
      plant_part: side_shoot
      initial_length_cm: 10
      side_branches_removed: true
      retained_leaves: top_leaves_only
      planted_immediately: true
      buried_depth_cm: 7
      buried_fraction: 0.67
    tracking_enabled:
      rooting: true
      turgor: true
      yellowing: true
      new_growth: true
      survival: true
    planned_observation_window_days: 14

  - event_id: pink_tomato_side_shoot_water_2026_06_17
    day_index: 6
    timestamp: 2026-06-17T07:10:00+03:00
    project_id: balcony-pot-house
    event_type: propagation_start
    parent_plant_id: tomato_pink_dream_02
    propagated_plant_id: tomato_side_shoot_02
    container_id: indoor_window_water_glass_01
    method: water_rooting
    material:
      plant_part: side_shoot
      initial_length_cm: 10
      extra_preparation: none
      water_depth_cm: 4
      location: indoor_window
    tracking_enabled:
      root_emergence: true
      turgor: true
      yellowing: true
      water_condition: true
      transplant_readiness: true
    planned_observation_window_days: 14

