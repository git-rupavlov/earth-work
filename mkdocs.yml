site_name: RP Project
site_description: Regenerative agriculture project documentation
site_author: RP Project

repo_url: https://github.com/git-rupavlov/earth-work
repo_name: git-rupavlov/earth-work

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

nav:
  - Home: index.md
  - Project:
      - Overview: project/overview.md
      - 3-Year Development Plan: project/three-year-plan.md
      - Site Assessment: project/site-assessment.md
  - Soil:
      - Ecological Processes: soil/ecological-processes.md
      - Soil Improvement Strategy: soil/soil-improvement-strategy.md
  - Plants:
      - Plant Profiles: plants/plant-profiles.md
      - Functional Groups: plants/functional-groups.md
      - Crop Matrix: plants/crop-matrix.md
  - Experiments:
      - Greenhouse 2026: experiments/greenhouse-2026.md
      - Bed Layout 2026: experiments/bed-layout-2026.md
  - Journal:
      - Field Journal: journal/index.md

extra_css:
  - assets/css/crop-matrix.css

extra_javascript:
  - assets/js/crop-matrix.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
