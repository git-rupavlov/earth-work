site_name: NoMad's Farm
site_description: Zen and the Art of Nomad Farming
site_author: Ruslav Pavlov
repo_url: https://github.com/git-rupavlov/earth-work
repo_name: git-rupavlov/earth-work

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

nav:
  - Home: index.md
  - About:
      - Overview: about/overview.md
  - Projects:
      - Project Registry: projects/index.md
      - Sprout Lab: projects/sprout-lab/index.md
      - Microclimate Lab: projects/microclimate-lab/index.md
      - Balcony Pot House: projects/balcony-pot-house/index.md
      - Gaitanevo 2026: projects/gaitanevo-2026/index.md
      - No-Maintenance Squash Trial: projects/no-maintenance-squash/index.md
      - Greenhouse 2026: projects/greenhouse-2026/index.md
  - Knowledge Base:
      - Source Hierarchy: knowledge/index.md
      - Content Audit: knowledge/content-audit.md
  - Soil:
      - Ecological Processes: soil/ecological-processes.md
      - Soil Improvement Strategy: soil/soil-improvement-strategy.md
  - Plants:
      - Plant Profiles: plants/plant-profiles.md
      - Functional Groups: plants/functional-groups.md
      - Crop Matrix: plants/crop-matrix.md
  - Systems:
      - Water Systems: water/index.md
      - Infrastructure: infrastructure/index.md
      - Monitoring & Automation: automation/index.md
  - Metrics:
      - App: metrics/app.md
      - Overview: metrics/index.md
      - Monitor: metrics/monitor.md
  - Journal:
      - Field Journal: journal/index.md
      - Tomato Trial 2026: journal/test-entry.md
  - Zen:
      - Zen and the Art of Nomad Farming: zen/index.md

extra_css:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
  - assets/css/garden-theme.css
  - assets/css/home-image.css
  - assets/css/page-heroes.css
  - assets/css/crop-matrix.css
  - assets/css/plant-monitor.css
  - assets/css/metrics-charts.css
  - assets/css/metrics-app.css
  - assets/css/zen.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js
  - assets/js/crop-matrix.js
  - assets/js/page-heroes.js
  - assets/js/plant-monitor.js
  - assets/js/pink-tomato-growth-monitor.js
  - assets/js/plant-monitor-unified.js
  - assets/js/plant-monitor-environment.js
  - assets/js/metrics-app.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
