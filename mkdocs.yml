site_name: NoMad's Farm
site_description: Zen and the Art of Nomad Farming
site_author: Ruslav Pavlov
repo_url: https://github.com/git-rupavlov/earth-work
repo_name: git-rupavlov/earth-work

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

nav:
  - Home: index.md
  - About:
      - Overview: about/overview.md
  - Projects:
      - Project Registry: projects/index.md
      - Sprout Lab:
          - Overview: sprout-lab/index.md
          - 3-Year Development Plan: projects/sprout-lab/three-year-plan.md
          - Site Assessment: projects/sprout-lab/site-assessment.md
      - Microclimate Lab:
          - Overview: projects/microclimate-lab.md
          - 3-Year Development Plan: projects/microclimate-lab/three-year-plan.md
          - Site Assessment: projects/microclimate-lab/site-assessment.md
      - Balcony Pot House:
          - Overview: projects/balcony-pot-house.md
          - 3-Year Development Plan: projects/balcony-pot-house/three-year-plan.md
          - Site Assessment: projects/balcony-pot-house/site-assessment.md
      - Gaitanevo 2026:
          - Overview: projects/gaitanevo-2026.md
          - 3-Year Development Plan: projects/gaitanevo-2026/three-year-plan.md
          - Site Assessment: projects/gaitanevo-2026/site-assessment.md
      - No-Maintenance Squash Trial:
          - Overview: projects/no-maintenance-squash.md
          - 3-Year Development Plan: projects/no-maintenance-squash/three-year-plan.md
          - Site Assessment: projects/no-maintenance-squash/site-assessment.md
      - Greenhouse 2026:
          - Overview: experiments/greenhouse-2026.md
          - 3-Year Development Plan: projects/greenhouse-2026/three-year-plan.md
          - Site Assessment: projects/greenhouse-2026/site-assessment.md
  - Knowledge Base:
      - Source Hierarchy: knowledge/index.md
      - Content Audit: knowledge/content-audit.md
  - Soil:
      - Ecological Processes: soil/ecological-processes.md
      - Soil Improvement Strategy: soil/soil-improvement-strategy.md
  - Plants:
      - Plant Profiles: plants/plant-profiles.md
      - Functional Groups: plants/functional-groups.md
      - Crop Matrix: plants/crop-matrix.md
  - Systems:
      - Water Systems: water/index.md
      - Infrastructure: infrastructure/index.md
      - Monitoring & Automation: automation/index.md
  - Journal:
      - Field Journal: journal/index.md
      - Tomato Trial 2026: journal/test-entry.md
  - Zen:
      - Zen and the Art of Nomad Farming: zen/index.md

extra_css:
  - assets/css/garden-theme.css
  - assets/css/home-image.css
  - assets/css/page-heroes.css
  - assets/css/crop-matrix.css
  - assets/css/zen.css

extra_javascript:
  - assets/js/crop-matrix.js
  - assets/js/page-heroes.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
