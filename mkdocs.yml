site_name: NoMad's Farm
site_description: Zen and the Art of Nomad Farming
site_author: Ruslav Pavlov

repo_url: https://github.com/git-rupavlov/earth-work
repo_name: git-rupavlov/earth-work

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

nav:
  - Home: index.md
  - Project:
      - Overview: project/overview.md
      - 3-Year Development Plan: project/three-year-plan.md
      - Site Assessment: project/site-assessment.md
  - Projects:
      - Project Registry: projects/index.md
      - Sprout Lab: sprout-lab/index.md
      - Microclimate Lab: projects/microclimate-lab.md
      - Balcony Pot House: projects/balcony-pot-house.md
      - Gaitanevo 2026: projects/gaitanevo-2026.md
      - No-Maintenance Squash Trial: projects/no-maintenance-squash.md
      - Greenhouse 2026: experiments/greenhouse-2026.md
  - Knowledge Base:
      - Source Hierarchy: knowledge/index.md
  - Soil:
      - Ecological Processes: soil/ecological-processes.md
      - Soil Improvement Strategy: soil/soil-improvement-strategy.md
  - Plants:
      - Plant Profiles: plants/plant-profiles.md
      - Functional Groups: plants/functional-groups.md
      - Crop Matrix: plants/crop-matrix.md
  - Systems:
      - Water Systems: water/index.md
      - Infrastructure: infrastructure/index.md
      - Monitoring & Automation: automation/index.md
      - Sprout Lab: sprout-lab/index.md
  - Experiments:
      - Greenhouse 2026: experiments/greenhouse-2026.md
      - Bed Layout 2026: experiments/bed-layout-2026.md
  - Journal:
      - Field Journal: journal/index.md
  - Zen:
      - Zen and the Art of Nomad Farming: zen/index.md

extra_css:
  - assets/css/garden-theme.css
  - assets/css/home-image.css
  - assets/css/page-heroes.css
  - assets/css/crop-matrix.css
  - assets/css/zen.css

extra_javascript:
  - assets/js/crop-matrix.js
  - assets/js/page-heroes.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
